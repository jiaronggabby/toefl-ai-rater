<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">TOEFL AI Rater product preview</title>
  <desc id="desc">A polished product preview showing local TOEFL practice inputs flowing into rubric-aligned scoring and structured feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101418"/>
      <stop offset="0.5" stop-color="#142225"/>
      <stop offset="1" stop-color="#26191f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="1" stop-color="#edf4f1"/>
    </linearGradient>
    <linearGradient id="score" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="0.52" stop-color="#f2b84b"/>
      <stop offset="1" stop-color="#f06b5f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <path d="M68 108 C202 42 326 36 449 86 C592 144 687 142 823 78 C958 15 1096 39 1218 126" fill="none" stroke="#14b8a6" stroke-width="2" stroke-opacity="0.32"/>
  <path d="M65 525 C230 440 391 466 529 523 C663 579 781 587 909 526 C1038 464 1145 448 1224 493" fill="none" stroke="#f06b5f" stroke-width="2" stroke-opacity="0.26"/>

  <g transform="translate(72 74)">
    <text x="0" y="0" fill="#f8faf7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="760" letter-spacing="0">TOEFL Speaking &amp; Writing AI Rater</text>
    <text x="0" y="42" fill="#b9c9c5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">Free local-first scoring for speaking and writing practice</text>
    <g transform="translate(0 74)">
      <rect x="0" y="0" width="154" height="34" rx="17" fill="#14b8a6" fill-opacity="0.18" stroke="#35d4c4" stroke-opacity="0.56"/>
      <text x="20" y="23" fill="#d7fffa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650">local-first</text>
      <rect x="170" y="0" width="180" height="34" rx="17" fill="#f2b84b" fill-opacity="0.16" stroke="#f2b84b" stroke-opacity="0.5"/>
      <text x="190" y="23" fill="#ffe7ab" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650">rubric-aligned</text>
      <rect x="366" y="0" width="210" height="34" rx="17" fill="#f06b5f" fill-opacity="0.16" stroke="#f06b5f" stroke-opacity="0.48"/>
      <text x="386" y="23" fill="#ffd4cf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="650">bring your provider</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="74" y="214" width="305" height="276" rx="18" fill="url(#panel)"/>
    <rect x="104" y="246" width="92" height="22" rx="11" fill="#14b8a6" fill-opacity="0.2"/>
    <text x="116" y="262" fill="#0f766e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="720">INPUTS</text>
    <text x="104" y="304" fill="#162225" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="760">Practice folder</text>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#344644">
      <text x="104" y="346">speaking_q1.transcript.txt</text>
      <text x="104" y="383">writing_q1.response.txt</text>
      <text x="104" y="420">prompt files + optional audio</text>
    </g>
    <g stroke="#d4dfdc" stroke-width="1">
      <line x1="104" y1="363" x2="342" y2="363"/>
      <line x1="104" y1="400" x2="342" y2="400"/>
      <line x1="104" y1="437" x2="342" y2="437"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="176" width="418" height="352" rx="22" fill="#f8faf7"/>
    <text x="464" y="224" fill="#162225" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="780">Rubric engine</text>
    <text x="464" y="255" fill="#596b68" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Heuristic mode or OpenAI-compatible scoring</text>
    <g transform="translate(464 300)">
      <rect x="0" y="0" width="330" height="18" rx="9" fill="#dfe9e6"/>
      <rect x="0" y="0" width="220" height="18" rx="9" fill="url(#score)"/>
      <text x="0" y="52" fill="#162225" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="800">3.1</text>
      <text x="92" y="50" fill="#596b68" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">overall speaking estimate</text>
    </g>
    <g transform="translate(464 408)" font-family="Inter, Segoe UI, Arial, sans-serif">
      <rect x="0" y="0" width="160" height="44" rx="10" fill="#ecf7f5"/>
      <text x="16" y="28" fill="#0f766e" font-size="15" font-weight="700">Task 3.2</text>
      <rect x="176" y="0" width="190" height="44" rx="10" fill="#fff4d8"/>
      <text x="192" y="28" fill="#966316" font-size="15" font-weight="700">Development 3.1</text>
      <rect x="0" y="58" width="160" height="44" rx="10" fill="#fbe8e5"/>
      <text x="16" y="86" fill="#b24139" font-size="15" font-weight="700">Fluency 2.9</text>
      <rect x="176" y="58" width="190" height="44" rx="10" fill="#eef1ff"/>
      <text x="192" y="86" fill="#4452a3" font-size="15" font-weight="700">Language 3.3</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="902" y="214" width="305" height="276" rx="18" fill="url(#panel)"/>
    <rect x="932" y="246" width="106" height="22" rx="11" fill="#f06b5f" fill-opacity="0.18"/>
    <text x="944" y="262" fill="#b24139" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="720">OUTPUTS</text>
    <text x="932" y="304" fill="#162225" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="760">Structured feedback</text>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#344644">
      <text x="932" y="346">report.json for tooling</text>
      <text x="932" y="383">report.md for review</text>
      <text x="932" y="420">scan results before sharing</text>
    </g>
    <g fill="none" stroke="#14b8a6" stroke-width="7" stroke-linecap="round">
      <path d="M939 458 L965 458"/>
      <path d="M982 458 L1035 458"/>
      <path d="M1052 458 L1142 458"/>
    </g>
  </g>

  <g stroke="#b8c8c5" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M386 352 C407 352 407 352 425 352"/>
    <path d="M849 352 C870 352 870 352 895 352"/>
  </g>
  <g fill="#f2b84b">
    <path d="M421 344 L438 352 L421 360 Z"/>
    <path d="M891 344 L908 352 L891 360 Z"/>
  </g>

  <text x="72" y="584" fill="#91a5a1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Transparent practice workflow: local files -> rubric dimensions -> reusable reports</text>
</svg>
